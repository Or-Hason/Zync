services:
  db:
    image: postgres:18-alpine
    container_name: zync-postgres
    restart: always
    environment:
      POSTGRES_USER: zync_user
      POSTGRES_PASSWORD: zync_password
      POSTGRES_DB: zync_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
